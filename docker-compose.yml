version: "3.8"

services:
  xclaw:
    build: .
    ports:
      - "18789:18789"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      PG_CONNECTION_STRING: postgresql://xclaw:xclaw@postgres:5432/xclaw
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/xclaw
      GATEWAY_PORT: "18789"
      GATEWAY_HOST: "0.0.0.0"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      LLM_MODEL: "llama3.1:8b"
    volumes:
      - xclaw-data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5451:5432"
    environment:
      POSTGRES_USER: xclaw
      POSTGRES_PASSWORD: xclaw
      POSTGRES_DB: xclaw
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xclaw"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  xclaw-data:
  pgdata:
  mongodata:
