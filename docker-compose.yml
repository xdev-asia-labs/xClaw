version: '3.8'

services:
  autox:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      PG_CONNECTION_STRING: postgresql://autox:autox@postgres:5432/autox
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017/autox
    volumes:
      - autox-data:/app/data
    restart: unless-stopped

  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autox
      POSTGRES_PASSWORD: autox
      POSTGRES_DB: autox
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autox"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  autox-data:
  pgdata:
  mongodata:
