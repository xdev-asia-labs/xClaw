<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Lightning bolt left side of X -->
  <path d="M 280 60 L 160 230 L 230 230 L 150 450 L 330 220 L 260 220 Z" 
        stroke="url(#grad1)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <!-- X right strokes -->
  <path d="M 260 80 L 380 230 L 380 230 L 260 430" 
        stroke="url(#grad2)" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
  <!-- Neural network nodes -->
  <circle cx="380" cy="130" r="12" fill="#8b5cf6"/>
  <circle cx="400" cy="260" r="10" fill="#a78bfa"/>
  <circle cx="360" cy="380" r="12" fill="#8b5cf6"/>
  <circle cx="310" cy="300" r="8" fill="#60a5fa"/>
  <!-- Neural connections -->
  <line x1="340" y1="110" x2="380" y2="130" stroke="#8b5cf6" stroke-width="3" opacity="0.6"/>
  <line x1="380" y1="130" x2="400" y2="260" stroke="#a78bfa" stroke-width="3" opacity="0.5"/>
  <line x1="400" y1="260" x2="360" y2="380" stroke="#8b5cf6" stroke-width="3" opacity="0.5"/>
  <line x1="380" y1="230" x2="400" y2="260" stroke="#a78bfa" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="300" x2="360" y2="380" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="310" y1="300" x2="400" y2="260" stroke="#60a5fa" stroke-width="2" opacity="0.3"/>
</svg>
