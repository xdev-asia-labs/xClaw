name: docs · Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs-deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build redirect page
        run: |
          mkdir -p pages-dist
          cat > pages-dist/index.html << 'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta http-equiv="refresh" content="0;url=https://xclaw.xdev.asia" />
              <title>xClaw Docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="https://xclaw.xdev.asia">xclaw.xdev.asia</a>...</p>
            </body>
          </html>
          HTML
          cp pages-dist/index.html pages-dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
