name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    name: Bump Version & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version in all packages
        id: bump
        run: |
          BUMP_TYPE="${{ github.event.inputs.bump }}"

          # Read current root version
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"

          # Bump root version (no git tag yet)
          npm version "$BUMP_TYPE" --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          # List of public packages to bump & publish
          PACKAGES=(
            "packages/shared"
            "packages/core"
            "packages/skills"
            "packages/gateway"
            "packages/cli"
          )

          # Bump version in each public package
          for pkg in "${PACKAGES[@]}"; do
            echo "Bumping $pkg to $NEW_VERSION"
            cd "$pkg"
            npm version "$NEW_VERSION" --no-git-tag-version
            cd "$GITHUB_WORKSPACE"
          done

          # Also update internal dependency references
          for pkg in "${PACKAGES[@]}"; do
            PKG_JSON="$pkg/package.json"
            # Update @xclaw/* dependency versions to ^NEW_VERSION
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$PKG_JSON', 'utf8'));
              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[depType]) continue;
                for (const [name, ver] of Object.entries(pkg[depType])) {
                  if (name.startsWith('@xclaw/') && ver !== '*') {
                    pkg[depType][name] = '^$NEW_VERSION';
                  }
                }
              }
              fs.writeFileSync('$PKG_JSON', JSON.stringify(pkg, null, 4) + '\n');
            "
          done

      - name: Sync docs API files
        run: node scripts/sync-versions.mjs

      - name: Build all packages
        run: npm run build

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGES=(
            "packages/shared"
            "packages/core"
            "packages/skills"
            "packages/gateway"
            "packages/cli"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --access public || echo "⚠️  Failed to publish $pkg (may already exist)"
            cd "$GITHUB_WORKSPACE"
          done

      - name: Commit & Tag
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add -A
          git commit -m "release: v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main --tags
