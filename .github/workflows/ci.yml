name: CI · Build, Lint & Test

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/docs-*.yml"
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/workflows/docs-*.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_ORDER: >-
    packages/shared
    packages/db
    packages/core
    packages/integrations
    packages/domains
    packages/ml
    packages/sandbox
    packages/skills
    packages/skill-hub
    packages/channels/telegram
    packages/channels/discord
    packages/channels/slack
    packages/channels/whatsapp
    packages/channels/zalo
    packages/channels/msteams
    packages/gateway
    packages/server

jobs:
  # ─── Lint ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint 'packages/*/src/**/*.ts' 'packages/channels/*/src/**/*.ts' --max-warnings 0
        continue-on-error: true

  # ─── TypeCheck ─────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all packages (dependency order)
        run: |
          for pkg_dir in $BUILD_ORDER; do
            if [[ -f "$pkg_dir/tsconfig.json" ]]; then
              PKG_NAME=$(node -p "require('./$pkg_dir/package.json').name")
              echo "::group::TypeCheck $PKG_NAME"
              npx tsc -b "$pkg_dir" --noEmit || npx tsc -b "$pkg_dir"
              echo "::endgroup::"
            fi
          done

  # ─── Security Audit ───────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: npm audit (production)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  # ─── Sandbox Tests ────────────────────────────────────
  sandbox-tests:
    name: Sandbox Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build dependencies
        run: |
          for pkg_dir in packages/shared packages/db packages/core packages/sandbox packages/skill-hub; do
            if [[ -f "$pkg_dir/tsconfig.json" ]]; then
              npx tsc -b "$pkg_dir"
            fi
          done

      - name: Run sandbox unit tests
        run: node --test tests/sandbox.test.mjs tests/sandbox-security.test.mjs
        env:
          NODE_ENV: test
          CREDENTIAL_ENCRYPTION_KEY: ci-test-key-32-characters-long!!

  # ─── Docker Build Verify ──────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image (verify only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Secret Detection ───────────────────────────────────
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Container Security Scan ──────────────────────────
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Build server image for scan
        run: docker build -t xclaw-server:scan -f Dockerfile .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: xclaw-server:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true
